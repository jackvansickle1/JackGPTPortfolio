    <filter id="glow"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="wm" width="360" height="150" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)"><text x="0" y="76" font-family="Arial" font-size="22" font-weight="700" fill="#fff" fill-opacity=".09">PORTFOLIO SAMPLE</text></pattern>
  </defs>
  <rect width="1280" height="720" fill="#08111f"/>
