<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Operating Signal YouTube thumbnail concept A</title>
  <desc id="desc">A dark navy B2B video thumbnail with an acid green headline and a modular signal diagram.</desc>
  <defs>
