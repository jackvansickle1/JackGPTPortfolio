  <rect x="78" y="54" width="1018" height="612" rx="30" fill="url(#panel)" stroke="#d7ff52" stroke-width="2"/>
  <rect x="108" y="88" width="310" height="47" rx="23.5" fill="#d7ff52"/>
  <circle cx="139" cy="111.5" r="8" fill="#08111f"/>
