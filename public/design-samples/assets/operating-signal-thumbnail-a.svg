    <line x1="34" y1="94" x2="34" y2="362" stroke="#34445d"/>
    <circle cx="141" cy="176" r="13" fill="#ff5c68" stroke="#f5f6f7" stroke-width="4"/>
    <circle cx="248" cy="306" r="13" fill="#ff5c68" stroke="#f5f6f7" stroke-width="4"/>
    <circle cx="379" cy="115" r="13" fill="#8af7d2" stroke="#f5f6f7" stroke-width="4"/>
    <rect x="34" y="391" width="136" height="42" rx="21" fill="#ff5c68"/>
    <text x="57" y="418" font-family="Arial" font-size="16" font-weight="800" letter-spacing="2" fill="#08111f">3 BAD SIGNALS</text>
